name: Promote NestJS image to infra

on:
  workflow_dispatch:
    inputs:
      image_digest:
        description: Image digest to promote, for example sha256:abc...
        required: true
        type: string
      image_version:
        description: Human-readable image version/tag for traceability
        required: true
        type: string
      environment:
        description: Target environment overlay
        required: true
        default: prod
        type: choice
        options:
          - prod

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repository
        uses: actions/checkout@v6
        with:
          repository: veecodekub/veecodekub-infra
          token: ${{ secrets.INFRA_REPO_PAT }}

      - name: Update NestJS image digest
        env:
          IMAGE_DIGEST: ${{ inputs.image_digest }}
          IMAGE_VERSION: ${{ inputs.image_version }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          const digest = process.env.IMAGE_DIGEST;
          const version = process.env.IMAGE_VERSION;
          const environment = process.env.ENVIRONMENT;
          const file = `apps/nestjs/overlays/${environment}/kustomization.yaml`;

          if (!/^sha256:[a-f0-9]{64}$/i.test(digest)) {
            throw new Error(`Invalid image digest: ${digest}`);
          }

          let content = fs.readFileSync(file, 'utf8');
          content = content.replace(
            /(  - name: ghcr\.io\/veecodekub\/nestjs-cicd\n)(?:    newTag: .+\n)?(?:    digest: .+\n)?/,
            `$1    newTag: ${version}\n    digest: ${digest}\n`,
          );
          fs.writeFileSync(file, content);
          NODE

      - name: Create promotion pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          branch: promote/nestjs-${{ inputs.environment }}-${{ inputs.image_version }}
          commit-message: Promote NestJS ${{ inputs.image_version }} to ${{ inputs.environment }}
          title: Promote NestJS ${{ inputs.image_version }} to ${{ inputs.environment }}
          body: |
            Promote `ghcr.io/veecodekub/nestjs-cicd@${{ inputs.image_digest }}` to `${{ inputs.environment }}`.

            This PR pins the deployment to an immutable image digest.
          labels: promotion,nestjs
