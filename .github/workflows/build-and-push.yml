name: Build and Push to GHCR

on:
    push:
        branches:
            - main
            - test
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    test:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma Client
              run: npx prisma generate

            - name: Run lint
              run: npm run lint

            - name: Run build
              run: npm run build

            - name: Run tests
              run: npm test

            - name: Audit dependencies
              run: npm audit --audit-level=high

            - name: Generate coverage report
              run: npm run test:cov
              continue-on-error: true

            - name: Upload coverage reports
              uses: codecov/codecov-action@v4
              continue-on-error: true
              with:
                  file: ./coverage/coverage-final.json
                  flags: unittests
                  name: codecov-umbrella

    build-and-push:
        needs: test
        runs-on: ubuntu-latest
        outputs:
            image-digest: ${{ steps.build.outputs.digest }}
            image-version: ${{ steps.get_version.outputs.version }}
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Get version from package.json
              id: get_version
              run: |
                  version=$(jq -r '.version' package.json)
                  echo "version=$version" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=${{ steps.get_version.outputs.version }}
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
                  
            - name: Build and push Docker image
              id: build
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Scan image vulnerabilities
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
                  vuln-type: os,library
                  severity: HIGH,CRITICAL
                  ignore-unfixed: true
                  exit-code: "1"

            - name: Generate SBOM
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
                  format: cyclonedx
                  output: nestjs-cicd-sbom.cdx.json
                  exit-code: "0"

            - name: Upload SBOM
              uses: actions/upload-artifact@v4
              with:
                  name: nestjs-cicd-sbom
                  path: nestjs-cicd-sbom.cdx.json

            - name: Write image metadata
              run: |
                  {
                    echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
                    echo "version=${{ steps.get_version.outputs.version }}"
                    echo "digest=${{ steps.build.outputs.digest }}"
                    echo "ref=${{ github.ref_name }}"
                    echo "sha=${{ github.sha }}"
                  } > image-metadata.txt

            - name: Upload image metadata
              uses: actions/upload-artifact@v4
              with:
                  name: nestjs-cicd-image-metadata
                  path: image-metadata.txt
