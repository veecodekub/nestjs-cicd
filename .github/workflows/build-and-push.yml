name: Build and Push to GHCR

on:
    push:
        branches:
            - main
            - test
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    test:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma Client
              run: npx prisma generate

            - name: Run lint
              run: npm run lint

            - name: Run build
              run: npm run build

            - name: Run tests
              run: npm test

            - name: Audit dependencies
              run: npm audit --audit-level=high

            - name: Generate coverage report
              run: npm run test:cov
              continue-on-error: true

            - name: Upload coverage reports
              uses: codecov/codecov-action@v7
              continue-on-error: true
              with:
                  files: ./coverage/coverage-final.json
                  flags: unittests
                  name: codecov-umbrella

    build-and-push:
        needs: test
        runs-on: ubuntu-latest
        outputs:
            image-digest: ${{ steps.build.outputs.digest }}
            image-version: ${{ steps.get_version.outputs.version }}
            image-tag: ${{ steps.get_version.outputs.promotion_tag }}
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Get version from package.json
              id: get_version
              run: |
                  version=$(jq -r '.version' package.json)
                  short_sha="${GITHUB_SHA::7}"
                  promotion_tag="${GITHUB_REF_NAME}-${short_sha}"
                  echo "version=$version" >> $GITHUB_OUTPUT
                  echo "promotion_tag=$promotion_tag" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to Container Registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=${{ steps.get_version.outputs.version }}
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix={{branch}}-
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push Docker image
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      APP_VERSION=${{ steps.get_version.outputs.version }}
                      GIT_SHA=${{ github.sha }}
                      IMAGE_TAG=${{ steps.get_version.outputs.promotion_tag }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Scan image vulnerabilities
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
                  vuln-type: os,library
                  severity: HIGH,CRITICAL
                  ignore-unfixed: true
                  exit-code: "1"

            - name: Generate SBOM
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
                  format: cyclonedx
                  output: nestjs-cicd-sbom.cdx.json
                  exit-code: "0"

            - name: Upload SBOM
              uses: actions/upload-artifact@v7
              with:
                  name: nestjs-cicd-sbom
                  path: nestjs-cicd-sbom.cdx.json

            - name: Write image metadata
              run: |
                  {
                    echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
                    echo "version=${{ steps.get_version.outputs.version }}"
                    echo "digest=${{ steps.build.outputs.digest }}"
                    echo "ref=${{ github.ref_name }}"
                    echo "sha=${{ github.sha }}"
                  } > image-metadata.txt

            - name: Upload image metadata
              uses: actions/upload-artifact@v7
              with:
                  name: nestjs-cicd-image-metadata
                  path: image-metadata.txt

    create-prod-promotion-pr:
        needs: build-and-push
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: ./.github/workflows/promote.yml
        with:
            image_digest: ${{ needs.build-and-push.outputs.image-digest }}
            image_version: ${{ needs.build-and-push.outputs.image-tag }}
            environment: prod
        secrets:
            INFRA_REPO_PAT: ${{ secrets.INFRA_REPO_PAT }}
